   UTILS
═══════════════════════════════════════ */
function seededRng(seed){
  let s=seed|1;
  return()=>{s=Math.imul(s^(s>>>15),s|1);s^=s+Math.imul(s^(s>>>7),s|61);return((s^(s>>>14))>>>0)/4294967296;};
}
function hashStr(str){
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193);}
  return h>>>0;
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){return new Date(iso+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});}
function colorLuminance(col){
  if(!col)return 128;
  if(col.startsWith("hsl")){const m=col.match(/hsl\([\d.]+,[\d.]+%,([\d.]+)%\)/);return m?parseFloat(m[1])*2.55:128;}
  return 0.299*parseInt(col.slice(1,3),16)+0.587*parseInt(col.slice(3,5),16)+0.114*parseInt(col.slice(5,7),16);
}

   CANVAS
═══════════════════════════════════════ */
function drawArtwork(canvas, entries, upToDate=null) {
  const W=1200, H=1200;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");

  let dates = Object.keys(entries).sort();
  if(upToDate) dates = dates.filter(d => d <= upToDate);
  if(dates.length===0) return;

  // Deep dark background — makes colors glow
  ctx.fillStyle="#0d0d14";
  ctx.fillRect(0,0,W,H);

  // Helper: smooth random cubic bezier path
  function fluidPath(ctx, x0,y0, rng, size){
    const cp1x = x0+(rng()-0.5)*size*2;
    const cp1y = y0+(rng()-0.5)*size*2;
    const cp2x = x0+(rng()-0.5)*size*2;
    const cp2y = y0+(rng()-0.5)*size*2;
    const x1   = x0+(rng()-0.5)*size*1.5;
    const y1   = y0+(rng()-0.5)*size*1.5;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x1,y1);
    return [x1,y1];
  }

  dates.forEach((date) => {
    const colors = Object.values(entries[date]);
    const rng = seededRng(hashStr(date));

    colors.forEach((color) => {
      const cx = rng()*W;
      const cy = rng()*H;
      const size = 60 + rng()*220;

      // ── 1. LARGE FLUID BLOB (Image 1 & 2 style) ──
      for(let layer=0; layer<3; layer++){
        const r = size*(1.4-layer*0.3);
        const offsetX = (rng()-0.5)*30;
        const offsetY = (rng()-0.5)*30;
        const grad = ctx.createRadialGradient(
          cx+offsetX, cy+offsetY, r*0.05,
          cx+offsetX, cy+offsetY, r
        );
        grad.addColorStop(0, color);
        grad.addColorStop(0.5, color+"cc");
        grad.addColorStop(1, color+"00");
        ctx.globalAlpha = 0.18 + rng()*0.28 - layer*0.05;
        ctx.fillStyle = grad;
        ctx.beginPath();
        // organic blob shape via many bezier points
        const pts = 7+Math.floor(rng()*5);
        const startA = rng()*Math.PI*2;
        for(let i=0;i<=pts;i++){
          const a = startA + (i/pts)*Math.PI*2;
          const wobble = 0.55 + rng()*0.9;
          const px = cx + Math.cos(a)*r*wobble + (rng()-0.5)*r*0.3;
          const py = cy + Math.sin(a)*r*wobble + (rng()-0.5)*r*0.3;
          i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        ctx.closePath();
        ctx.fill();
      }

      // ── 2. SWIRLING RIBBON stroke (Image 1 style) ──
      const numRibbons = 2+Math.floor(rng()*3);
      for(let rb=0;rb<numRibbons;rb++){
        ctx.beginPath();
        let rx = cx+(rng()-0.5)*size;
        let ry = cy+(rng()-0.5)*size;
        ctx.moveTo(rx,ry);
        const ribbonLen = 3+Math.floor(rng()*6);
        const ribbonSize = size*(0.5+rng()*0.8);
        for(let s=0;s<ribbonLen;s++){
          [rx,ry] = fluidPath(ctx, rx,ry, rng, ribbonSize);
        }
        const ribbonGrad = ctx.createLinearGradient(cx-size,cy,cx+size,cy);
        ribbonGrad.addColorStop(0, color+"00");
        ribbonGrad.addColorStop(0.3, color+"ee");
        ribbonGrad.addColorStop(0.7, color+"ee");
        ribbonGrad.addColorStop(1, color+"00");
        ctx.globalAlpha = 0.45+rng()*0.45;
        ctx.strokeStyle = ribbonGrad;
        ctx.lineWidth = 4+rng()*28;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      }

      // ── 3. BOLD OVAL BLOBS (Image 4 style) ──
      const numBlobs = 3+Math.floor(rng()*8);
      for(let b=0;b<numBlobs;b++){
        const bx = cx+(rng()-0.5)*size*2.5;
        const by = cy+(rng()-0.5)*size*2.5;
        const bw = 8+rng()*55;
        const bh = bw*(0.4+rng()*1.2);
        const ba = rng()*Math.PI*2;
        ctx.save();
        ctx.translate(bx,by);
        ctx.rotate(ba);
        ctx.globalAlpha = 0.65+rng()*0.35;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);
        ctx.fill();
        // thin bright outline
        ctx.globalAlpha = 0.25+rng()*0.2;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 0.5+rng()*1.5;
        ctx.stroke();
        ctx.restore();
      }

      // ── 4. IMPASTO bright highlight ──
      ctx.globalAlpha = 0.8+rng()*0.2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx+(rng()-0.5)*size*0.3, cy+(rng()-0.5)*size*0.3, 3+rng()*12, 0, Math.PI*2);
      ctx.fill();
    });
  });

  ctx.globalAlpha=1;

  // Soft inner glow vignette (keeps center alive)
  const vgIn = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.42);
  vgIn.addColorStop(0,"rgba(255,255,255,0.04)");
  vgIn.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=vgIn; ctx.fillRect(0,0,W,H);

  // Edge vignette
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.32,W/2,H/2,W*0.76);
  vg.addColorStop(0,"rgba(0,0,0,0)");
  vg.addColorStop(1,"rgba(0,0,0,0.65)");
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Day label
  if(dates.length>0){
    ctx.globalAlpha=0.4;
    ctx.fillStyle="#ffffff";
    ctx.font="600 15px sans-serif";
    ctx.textAlign="right";
    ctx.fillText(`IRIS · giorno ${dates.length}`, W-24, H-22);
  }
  ctx.globalAlpha=1;
}

async function loadEntries(){

    if(data&&typeof data==="object") state.entries=data;
  }catch(e){console.warn("Firebase load:",e);}
}

function render(){
  const app=document.getElementById("app");
  const s=state;
  const today=todayStr();
  const theme=THEMES[hashStr(today)%THEMES.length];
  const todayEntries=s.entries[today]||{};
  const totalDays=Object.keys(s.entries).length;
  const totalColors=Object.values(s.entries).reduce((a,d)=>a+Object.keys(d).length,0);
  const isGrad=theme.pal[0].startsWith("hsl");
  const sortedDates=Object.keys(s.entries).sort();

  if(s.screen==="loading"){
    app.innerHTML=`<div class="card" style="text-align:center"><div class="spinner"></div></div>`;
    return;
  }

  if(s.screen==="home"){
    const memberBtns=MEMBERS.map(m=>{
      const done=todayEntries[m];
      const dotHtml=done?`<div class="dot" style="background:${done};box-shadow:0 0 8px ${done}"></div>`:"";

      const c=todayEntries[m];
      return `<div class="today-dot" title="${m}" style="background:${c||"#b8d8ba"};${c?`box-shadow:0 0 6px ${c}`:""}"></div>`;
    }).join("");
    const previewDots=theme.pal.map(c=>`<div class="preview-dot" style="background:${c}"></div>`).join("");
    app.innerHTML=`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
          <div class="logo logo-sm">IRIS</div>
          <div class="stats-row">

        </div>
        <div class="share-box">📱 Salva questa pagina nei preferiti del telefono per aprirla ogni giorno</div>
      </div>`;
    return;
  }

    const alreadyDone=s.entries[today]?.[s.activeMember];

      const active=s.pickedIdx===i;
      const sz=active?46:38;

        <button class="btn" onclick="goCanvas()">Vedi il quadro →</button>
      </div>`:"";
    const gradLabels=isGrad&&!alreadyDone?`<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.65rem;color:#7a9a7c;letter-spacing:.08em;text-transform:uppercase"><span>← poco</span><span>molto →</span></div>`:"";
    app.innerHTML=`
      <div class="card" style="background:${s.flash?"rgba(255,255,255,0.18)":"rgba(240,250,241,0.85)"};border:${s.flash?"none":"1px solid #a8cfaa"}">
        <button class="back-btn" style="color:${s.flash?textOnFlash+"aa":"#7a9a7c"}" onclick="goHome()">← torna</button>
        <div style="text-align:center;margin-bottom:24px">
          <p style="font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:${s.flash?textOnFlash+"99":"#7a9a7c"};margin-bottom:4px;font-family:'Syne',sans-serif;font-weight:600">${s.activeMember}</p>
          <div style="font-size:2.8rem;margin-bottom:10px;line-height:1">${theme.emoji}</div>
          <h2 style="font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:700;color:${s.flash?textOnFlash:"#1a2e1c"};line-height:1.25;letter-spacing:-.02em">${theme.q}</h2>
        </div>
        ${!alreadyDone?`${gradLabels}<div class="palette7">${swatches}</div>`:``}
        ${confirmHtml}
      </div>`;
    return;
  }

  if(s.screen==="canvas"){
    document.body.style.background="";
    const displayDay=s.evoDay!==null?s.evoDay:sortedDates.length-1;
    const displayDate=sortedDates[displayDay];
    const colorsOfDay=displayDate&&s.entries[displayDate]?Object.entries(s.entries[displayDate]).map(([m,c])=>`
      <div style="text-align:center">
        <div style="width:28px;height:28px;border-radius:50%;background:${c};margin:0 auto 4px;box-shadow:0 0 10px ${c}88"></div>
        <span style="font-size:.62rem;color:#7a9a7c">${m}</span>
      </div>`).join(""):"";
    const sliderHtml=sortedDates.length>1?`
      <div class="evo-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span class="label" style="margin-bottom:0">Evoluzione</span>
          <span style="font-size:.72rem;color:#5a7a5c;font-weight:500">${s.evoDay===null?"quadro completo":fmtDate(displayDate)}</span>
        </div>
        <input type="range" min="0" max="${sortedDates.length-1}" value="${s.evoDay===null?sortedDates.length-1:s.evoDay}" oninput="setEvo(this.value,${sortedDates.length-1})"/>
        <div style="display:flex;justify-content:space-between;font-size:.62rem;color:#7a9a7c;margin-top:4px">
          <span>giorno 1</span>
          <button onclick="setEvo(${sortedDates.length-1},${sortedDates.length-1})" style="background:none;border:none;color:#2d5a30;font-size:.7rem;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;padding:0">${s.evoDay!==null?"→ completo":"✓ completo"}</button>
          <span>oggi</span>
        </div>
      </div>`:"";
    app.innerHTML=`
      <div class="card card-wide">
        <button class="back-btn" onclick="goHome()">← home</button>
        <h2 class="logo" style="font-size:1.4rem;margin-bottom:4px">IRIS — il vostro quadro</h2>
        <p class="sub">${totalDays>0?`${totalDays} ${totalDays===1?"giorno":"giorni"} · ${totalColors} colori depositati`:"Ancora nessun colore."}</p>
        <canvas id="irisCanvas" class="canvas-wrap"></canvas>
        ${sliderHtml}
        ${colorsOfDay?`<div style="margin-bottom:20px"><span class="label" style="margin-bottom:8px">${s.evoDay===null?"Colori di oggi":"Colori di quel giorno"}</span><div style="display:flex;gap:10px;flex-wrap:wrap">${colorsOfDay}</div></div>`:""}
        <button class="btn" onclick="goHome()">+ Aggiungi colori</button>
      </div>`;
    // Draw after DOM update
    requestAnimationFrame(()=>{
      const canvas=document.getElementById("irisCanvas");
      if(!canvas) return;
      if(sortedDates.length===0) return;
      const upTo=s.evoDay!==null?sortedDates[Math.min(s.evoDay,sortedDates.length-1)]:null;
      drawArtwork(canvas,s.entries,upTo);
    });
    return;
  }
}

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function startCheckin(member){
  const today=todayStr();
  const existing=state.entries[today]?.[member]||null;
  setState({screen:"checkin",activeMember:member,picked:existing,pickedIdx:null,flash:false});
}
function pickColor(color,idx){setState({picked:color,pickedIdx:idx});}
function goHome(){document.body.style.background="";setState({screen:"home",flash:false});}
function goCanvas(){setState({screen:"canvas",evoDay:null});}
function setEvo(val,max){
  const v=parseInt(val);
  setState({evoDay:v===max?null:v});
}
async function loadAndRefresh(){await loadEntries();render();}
async function submitColor(){
  const today=todayStr();
  if(!state.picked) return;
  const ne={...state.entries};
  if(!ne[today]) ne[today]={};
  ne[today]={...ne[today],[state.activeMember]:state.picked};
  state.flash=true;
  state.entries=ne;
  render();
  try{await fbSet("iris_entries",ne);}catch(e){console.warn("Firebase save:",e);}
  setTimeout(()=>{state.flash=false;setState({screen:"canvas",evoDay:null});},900);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
(async()=>{
  render(); // show spinner
  await loadEntries();
  setState({screen:"home"});
})();
</script>
